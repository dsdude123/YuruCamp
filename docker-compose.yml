services:
  mqtt:
    image: eclipse-mosquitto:2
    configs:
      - source: mosquitto_conf
        target: /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"

  mesh_gateway:
    build: ./mesh_gateway
    environment:
      MQTT_HOST: mqtt
      # Override on hosts where the device enumerates differently, e.g.
      # SERIAL_PORT=/dev/ttyUSB0 for CP210x/CH340 boards. Leave unset to
      # let the gateway auto-detect by USB VID/PID.
      SERIAL_PORT: ${SERIAL_PORT:-}
    devices:
      # ESP32-S3 native USB enumerates as a CDC ACM device.
      # For a stable path across replugs, prefer the by-id symlink, e.g.:
      #   - "/dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_XX-XX-XX-if00:/dev/ttyACM0"
      - "${MESH_DEVICE:-/dev/ttyACM0}:/dev/ttyACM0"
    depends_on:
      - mqtt
    restart: unless-stopped

  camp_router:
    build: ./camp_router
    environment:
      MQTT_HOST: mqtt
    depends_on:
      - mqtt
    restart: unless-stopped

  camp_terminal:
    build: ./camp_terminal
    environment:
      MQTT_HOST: mqtt
    ports:
      - "8080:8080"
    depends_on:
      - mqtt
    restart: unless-stopped

  camp_rally:
    build: ./camp_rally
    environment:
      MQTT_HOST: mqtt
    depends_on:
      - mqtt
    restart: unless-stopped

configs:
  mosquitto_conf:
    content: |
      listener 1883
      allow_anonymous true

