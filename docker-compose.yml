services:
  mqtt:
    image: eclipse-mosquitto:2
    configs:
      - source: mosquitto_conf
        target: /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"

  mesh_gateway:
    build: ./mesh_gateway
    environment:
      MQTT_HOST: mqtt
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"
    depends_on:
      - mqtt
    restart: unless-stopped

  camp_router:
    build: ./camp_router
    environment:
      MQTT_HOST: mqtt
    depends_on:
      - mqtt
    restart: unless-stopped

  camp_terminal:
    build: ./camp_terminal
    environment:
      MQTT_HOST: mqtt
    ports:
      - "8080:8080"
    depends_on:
      - mqtt
    restart: unless-stopped

  camp_rally:
    build: ./camp_rally
    environment:
      MQTT_HOST: mqtt
      EVENT_ID: "4632"
      SIMULATE_MODE: ""
    depends_on:
      - mqtt
    restart: unless-stopped

  camp_announce:
    image: eclipse-mosquitto:2
    command: >
      sh -c "until mosquitto_pub -h mqtt -t /yurucamp/outbound -m 'YuruCamp stack online' 2>/dev/null; do
        echo 'Waiting for MQTT...'; sleep 2;
      done; echo 'Startup message sent'"
    depends_on:
      - mqtt
      - camp_router
    restart: "no"

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"
    restart: unless-stopped

configs:
  mosquitto_conf:
    content: |
      listener 1883
      allow_anonymous true
