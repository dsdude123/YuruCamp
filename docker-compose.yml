services:
  mqtt:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"

  mesh_gateway:
    build: ./mesh_gateway
    environment:
      MQTT_HOST: mqtt
      SERIAL_PORT: /dev/ttyUSB0
      BAUD_RATE: "115200"
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    depends_on:
      - mqtt
    restart: unless-stopped

  camp_router:
    build: ./camp_router
    environment:
      MQTT_HOST: mqtt
    depends_on:
      - mqtt
    restart: unless-stopped

  camp_terminal:
    build: ./camp_terminal
    environment:
      MQTT_HOST: mqtt
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - mqtt
    restart: unless-stopped

  camp_rally:
    build: ./camp_rally
    environment:
      MQTT_HOST: mqtt
      EVENT_ID: "4491"
      POLL_INTERVAL: "30"
    depends_on:
      - mqtt
    restart: unless-stopped
