services:
  mqtt:
    image: eclipse-mosquitto:2
    configs:
      - source: mosquitto_conf
        target: /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t /healthcheck -m ok -q 0"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mesh_gateway:
    build: ./mesh_gateway
    environment:
      MQTT_HOST: mqtt
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"
    depends_on:
      mqtt:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  camp_router:
    build: ./camp_router
    environment:
      MQTT_HOST: mqtt
    depends_on:
      mqtt:
        condition: service_healthy
    restart: unless-stopped

  camp_terminal:
    build: ./camp_terminal
    environment:
      MQTT_HOST: mqtt
    ports:
      - "8080:8080"
    depends_on:
      mqtt:
        condition: service_healthy
      mesh_gateway:
        condition: service_healthy
    restart: unless-stopped

  camp_rally:
    build: ./camp_rally
    command: ["sh", "-c", "sleep 10 && exec python main.py"]
    environment:
      MQTT_HOST: mqtt
      EVENT_ID: "4632"
      SIMULATE_MODE: ${SIMULATE_MODE:-}
    depends_on:
      mqtt:
        condition: service_healthy
      mesh_gateway:
        condition: service_healthy
    restart: unless-stopped

  camp_weather:
    build: ./camp_weather
    command: ["sh", "-c", "sleep 10 && exec python main.py"]
    environment:
      MQTT_HOST: mqtt
    depends_on:
      mqtt:
        condition: service_healthy
      mesh_gateway:
        condition: service_healthy
    restart: unless-stopped

  camp_grok:
    build: ./camp_grok
    command: ["sh", "-c", "sleep 10 && exec python main.py"]
    environment:
      MQTT_HOST: mqtt
      XAI_API_KEY: "${XAI_API_KEY:-}"
    depends_on:
      mqtt:
        condition: service_healthy
      mesh_gateway:
        condition: service_healthy
    restart: unless-stopped

  camp_sportity:
    build: ./camp_sportity
    environment:
      MQTT_HOST: mqtt
      XAI_API_KEY: "${XAI_API_KEY:-}"
      SPORTITY_URL: "${SPORTITY_URL:-https://webapp.sportity.com/event/OTR2026/751bfffa-ae55-43db-a6cd-e6ff0d64ce2e}"
    volumes:
      - sportity_data:/data
    depends_on:
      mqtt:
        condition: service_healthy
      mesh_gateway:
        condition: service_healthy
    restart: unless-stopped

  camp_announce:
    image: eclipse-mosquitto:2
    command: >
      sh -c "sleep 5; until mosquitto_pub -h mqtt -t /yurucamp/outbound -m 'YuruCamp stack online' 2>/dev/null; do
        echo 'Waiting for MQTT...'; sleep 2;
      done; echo 'Startup message sent'; while true; do sleep 3600; done"
    depends_on:
      mqtt:
        condition: service_healthy
      mesh_gateway:
        condition: service_healthy
      camp_router:
        condition: service_started
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"
    restart: unless-stopped

volumes:
  sportity_data:

configs:
  mosquitto_conf:
    content: |
      listener 1883
      allow_anonymous true
